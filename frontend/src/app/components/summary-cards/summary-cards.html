<!-- Summary cards displaying important driver analytics -->

<section class="summary-grid">

  <!-- Driver Safety Score Card -->
  <div class="summary-card">

    <mat-icon class="dashboard-icon">
      shield
    </mat-icon>

    <div>

      <p class="card-label">
        Driver Safety Score
      </p>

      <h2>
        92 / 100
      </h2>

      <span class="positive">
        Low risk driving pattern
      </span>

    </div>

  </div>

  <!-- Total Trips Card -->

  <div class="summary-card">

    <mat-icon class="dashboard-icon">
      directions_car
    </mat-icon>

    <div>

      <p class="card-label">
        Total Trips
      </p>

      <h2>
        157
      </h2>

      <span>
        Tracked driving sessions
      </span>

    </div>

  </div>

  <!-- Crash Risk Card -->

  <div class="summary-card">

    <mat-icon class="dashboard-icon warning">
      warning
    </mat-icon>

    <div>

      <p class="card-label">
        Crash Risk Level
      </p>

      <h2>
        Low
      </h2>

      <span class="positive">
        Based on sample analytics
      </span>

    </div>

  </div>

</section>
