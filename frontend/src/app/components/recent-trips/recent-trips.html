<!-- Recent trips section showing sample driving history -->
<div class="table-card">

  <!-- Section title -->
  <h3>Recent Trips</h3>

  <!-- Short explanation of the table -->
  <p>Sample trip records showing distance, duration, and risk level.</p>

  <!-- Recent trips table -->
  <table>

    <!-- Table header row -->
    <thead>
      <tr>
        <th>Date</th>
        <th>Distance</th>
        <th>Duration</th>
        <th>Risk</th>
      </tr>
    </thead>

    <!-- Table data rows -->
   <!-- Table data rows generated from DashboardService -->
<tbody>

  <tr *ngFor="let trip of recentTrips">
    <td>{{ trip.date }}</td>
    <td>{{ trip.distance }}</td>
    <td>{{ trip.duration }}</td>

    <td>
      <span
        class="risk"
        [class.low]="trip.risk === 'Low'"
        [class.medium]="trip.risk === 'Medium'"
        [class.high]="trip.risk === 'High'">
        {{ trip.risk }}
      </span>
    </td>
  </tr>

</tbody>
  </table>

</div>
